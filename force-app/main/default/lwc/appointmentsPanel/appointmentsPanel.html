<template>

    <lightning-card title="Appointments">

        <template if:true={appointments}>

            <div class="slds-p-around_medium">

                <table class="slds-table slds-table_cell-buffer slds-table_bordered">

                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Doctor</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>

                        <template for:each={appointments} for:item="appt">

                            <tr key={appt.Id}>
                                <td>{appt.Appointment_Date__c}</td>
                                <td>{appt.Doctor__r.Name}</td>
                                <td>{appt.Status__c}</td>
                            </tr>

                        </template>

                    </tbody>

                </table>

            </div>

        </template>

        <template if:false={appointments}>
            <p class="slds-p-around_medium">No Appointments Found</p>
        </template>

    </lightning-card>

</template>
