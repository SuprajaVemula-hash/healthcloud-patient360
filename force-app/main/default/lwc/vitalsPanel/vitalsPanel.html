<template>

<lightning-card title="Vitals & Labs" icon-name="utility:favorite">

    <div class="vitals-container">

        <template for:each={formattedVitals} for:item="item">

            <div key={item.Id} class="vital-card">

                <div class="icon">
                    {getIcon(item.displayName)}
                </div>

                <div class="info">

                    <div class="label">
                       Name: {item.displayName}
                    </div>

                    <div class="value">
                        Status:{item.displayValue}
                    </div>
                    <div class="date">
                        Recorded On: {item.displayDate}
                    </div>

                </div>

            </div>

        </template>

    </div>

</lightning-card>

</template>
