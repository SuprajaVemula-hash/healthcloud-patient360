<template>

<lightning-card title="Health Timeline" icon-name="standard:event">

    <div class="timeline">

        <template for:each={formattedTimeline} for:item="event">

            <div key={event.id} class="timeline-item">

                <div class="dot"></div>

                <div class="content">

                   <div class="timeline-title">
    {event.title}
</div>

<div class="timeline-type">
    {event.type} - {event.status}
</div>

<div class="timeline-date">
    {event.formattedDate}
</div>

                </div>

            </div>

        </template>

    </div>

</lightning-card>

</template>
