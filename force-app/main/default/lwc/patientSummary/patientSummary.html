<template>

    <lightning-card title="Patient Summary">

        <template lwc:if={patient}>
            <div class="slds-p-around_medium">

                <p><strong>Name:</strong> {patient.Name}</p>

                <p><strong>Birthdate:</strong> {patient.PersonBirthdate}</p>

                <p><strong>Phone:</strong> {patient.PersonMobilePhone}</p>

            </div>
        </template>

          <template lwc:elseif={error}>
            <p class="slds-text-color_error">
                Error loading patient
            </p>
        </template>

        <template lwc:else>
            <p>No patient data available</p>
        </template>

    </lightning-card>

</template>
