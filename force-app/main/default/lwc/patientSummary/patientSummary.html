<template>

    <lightning-card title="Patient Summary">

        <template lwc:true={patient}>

            <div class="slds-p-around_medium">

                <p><strong>Name:</strong> {patient.name}</p>

                <p><strong>Birth Date:</strong> {patient.birthDate}</p>

                

                <p><strong>Phone:</strong> {patient.phone}</p>

                

            </div>

        </template>

        <template lwc:true={error}>
            <p class="slds-text-color_error">Error loading patient data</p>
        </template>

    </lightning-card>

</template>
