<template>

<lightning-card title="Medications" icon-name="utility:drug">

    <template if:true={medications}>

        <ul class="med-list">

            <template for:each={medications} for:item="med">

                <li key={med.Id} class="med-item">
                    <span class ="med-name">
                       Medication Name: {med.Name}
                    </span>
                    <br/>

                    <span class="med-name">
                       Medicine Name: {med.Medicine_Name__c}
                    </span>
                    <br/>

                    <span class="dose">
                       Dosage: {med.Dosage__c}
                    </span>
                    <br/>
                    <span class="status">
                       Start Date: ({med.Start_Date__c})
                    </span>

                </li>

            </template>

        </ul>

    </template>

</lightning-card>

</template>
