<template>

    <lightning-card title="Medications">

        <template if:true={medications}>

            <div class="slds-p-around_medium">

                <table class="slds-table slds-table_cell-buffer slds-table_bordered">

                    <thead>
                        <tr>
                            <th>Medicine</th>
                            <th>Dosage</th>
                            <th>Start Date</th>
                        </tr>
                    </thead>

                    <tbody>

                        <template for:each={medications} for:item="med">

                            <tr key={med.Id}>
                                <td>{med.Medicine_Name__c}</td>
                                <td>{med.Dosage__c}</td>
                                <td>{med.Start_Date__c}</td>
                            </tr>

                        </template>

                    </tbody>

                </table>

            </div>

        </template>

        <template if:false={medications}>
            <p class="slds-p-around_medium">No Medications Found</p>
        </template>

    </lightning-card>

</template>
